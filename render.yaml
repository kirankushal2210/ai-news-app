services:
  - type: web
    name: ai-news-aggregator
    env: docker
    region: oregon
    branch: main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: USE_CLOUD_LLM
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
