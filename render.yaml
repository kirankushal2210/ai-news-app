services:
  - type: web
    name: ai-news-aggregator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 4 -b 0.0.0.0:$PORT web:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false

databases:
  - name: ai-news-db
    databaseName: ai_news_aggregator
    user: postgres
    plan: free
